spring.application.name=GalileoBackendApplicatoin

# Database - reads from environment variables in production,
# falls back to local values for development
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/GalileoDB}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sesame}

# Hibernate config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Secret
jwt.secret=${JWT_SECRET:aRd/yHJzRN7GPi/vldKWYE/flS5OU1g9C7mk+IaDTME=}

# Server port (Render sets this automatically)
server.port=${PORT:8080}