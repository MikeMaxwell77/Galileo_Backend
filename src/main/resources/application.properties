spring.application.name=GalileoBackendApplicatoin

# Database - reads from environment variables in production,
# falls back to local values for development
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/GalileoDB}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:sesame}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

